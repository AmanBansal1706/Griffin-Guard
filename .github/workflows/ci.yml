name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  proxy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/viper-proxy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go fmt ./...
      - run: go vet ./...
      - run: go test ./...
      - run: go test -race ./...

  python-services:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install ruff pytest
      - run: ruff check services/pii-lambda/src services/parquet-compactor/src
      - run: python -m py_compile services/pii-lambda/src/*.py services/parquet-compactor/src/*.py
      - run: pytest services/pii-lambda/tests services/parquet-compactor/tests

  analytics-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/analytics-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/analytics-ui/package.json
      - run: npm install
      - run: npm audit --audit-level=high
      - run: npm run test
      - run: NEXT_DISABLE_ESLINT=1 npm run build

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform -chdir=infra/terraform/environments/prod init -backend=false
      - run: terraform -chdir=infra/terraform/environments/prod validate
